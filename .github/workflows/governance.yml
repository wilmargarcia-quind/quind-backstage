name: Agentic Governance + Security Scan

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Gitleaks — secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  guardian:
    name: Guardian analysis
    runs-on: ubuntu-latest
    needs: gitleaks
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # WIF (preferred — requires pool provisioned in GCP):
          #   workload_identity_provider: projects/587459711970/locations/global/workloadIdentityPools/github-org-pool/providers/github-org-provider
          #   service_account: github-actions-org@development-test-456814.iam.gserviceaccount.com
          # Fallback: service account key stored as GOOGLE_CREDENTIALS secret
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure npm for Artifact Registry
        run: |
          npm config set @agentic-suite:registry https://us-central1-npm.pkg.dev/development-test-456814/agentic-suite/
          npx google-artifactregistry-auth --yes

      - name: Install Agentic CLI
        run: npm install -g @agentic-suite/cli

      - name: Run Guardian analysis
        env:
          AGENTIC_TOKEN: ${{ secrets.AGENTIC_TOKEN }}
        run: agentic check --json --fail-under 60
