name: Agentic Governance + Security Scan

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Gitleaks — secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  guardian:
    name: Guardian analysis
    runs-on: ubuntu-latest
    needs: gitleaks
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check GCP credentials
        id: creds
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::GOOGLE_CREDENTIALS secret not configured — Guardian analysis skipped"
          fi

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.available == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure npm for Artifact Registry
        if: steps.creds.outputs.available == 'true'
        run: |
          npm config set @agentic-suite:registry https://us-central1-npm.pkg.dev/development-test-456814/agentic-suite/
          npx google-artifactregistry-auth --yes

      - name: Install Agentic CLI
        if: steps.creds.outputs.available == 'true'
        run: npm install -g @agentic-suite/cli

      - name: Run Guardian analysis
        if: steps.creds.outputs.available == 'true'
        env:
          AGENTIC_TOKEN: ${{ secrets.AGENTIC_TOKEN }}
        run: agentic check --json --fail-under 60
