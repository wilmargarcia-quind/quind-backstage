name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, prod]

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  DOCS_REPO: https://github.com/wilmargarcia-quind/quind-architecture-docs.git

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Check GCP credentials
        id: creds
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::GOOGLE_CREDENTIALS not configured — deploy skipped"
          fi

      - name: Authenticate to Google Cloud
        if: steps.creds.outputs.available == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Set up Cloud SDK
        if: steps.creds.outputs.available == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.creds.outputs.available == 'true'
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        if: steps.creds.outputs.available == 'true'
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${PROJECT_ID}/quind-backstage/app:${{ github.sha }}"
          docker build \
            --build-arg DOCS_REPO=${{ env.DOCS_REPO }} \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        if: steps.creds.outputs.available == 'true'
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          ENV_NAME: ${{ steps.env.outputs.name }}
        run: |
          SERVICE="quind-backstage-${ENV_NAME}"
          [ "$ENV_NAME" = "prod" ] && SERVICE="quind-backstage"

          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 30s \
            --project "$PROJECT_ID" \
            --set-env-vars "GITHUB_ORG=quind,DOCS_PATH=/app/quind-architecture-docs" \
            --set-secrets "\
              AUTH_SECRET=AUTH_SECRET:latest,\
              AUTH_GITHUB_ID=AUTH_GITHUB_ID:latest,\
              AUTH_GITHUB_SECRET=AUTH_GITHUB_SECRET:latest,\
              GITHUB_WEBHOOK_SECRET=GITHUB_WEBHOOK_SECRET:latest,\
              DATABASE_URL=DATABASE_URL:latest"

          URL=$(gcloud run services describe "$SERVICE" \
            --region ${{ env.REGION }} \
            --project "$PROJECT_ID" \
            --format "value(status.url)")
          echo "::notice::Deployed to $ENV_NAME → $URL"
